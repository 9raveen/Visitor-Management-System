<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <title>Visitor Registration</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Calistoga&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/stylesheet.css" />
  </head>

  <body>
    <div class="logo-container text-center my-4">
      <img src="images/logo.png" alt="Logo" class="logo-img" />
    </div>

    <div class="main-container text-center">
      <h1 class="title mb-4">VISITOR REGISTRATION PORTAL</h1>

      <button
        class="btn btn-custom mb-3"
        data-bs-toggle="modal"
        data-bs-target="#registerModal"
      >
        <i class="bi bi-pencil-square me-1"></i> Register
      </button>

      <button
        class="btn btn-custom mb-3"
        data-bs-toggle="modal"
        data-bs-target="#exitModal"
      >
        <i class="bi bi-box-arrow-right me-1"></i> Check-Out
      </button>
    </div>

    <!-- Register Modal -->
    <div
      class="modal fade"
      id="registerModal"
      tabindex="-1"
      aria-labelledby="registerLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content p-4">
          <h5 class="modal-title text-center mb-4" id="registerLabel">
            Enter Your Details
          </h5>
          <form action="entry.php" method="POST">
            <div class="mb-3">
              <label>Name</label>
              <input type="text" class="form-control" name="Name" required />
            </div>
            <div class="mb-3">
              <label>Email</label>
              <input type="email" class="form-control" name="Email" required />
            </div>
            <div class="mb-3">
              <label>Phone</label>
              <input type="number" class="form-control" name="Phone" required />
            </div>
            <div class="mb-3">
              <label>Host Name</label>
              <input
                type="text"
                class="form-control"
                name="HostName"
                required
              />
            </div>
            <div class="mb-3">
              <label>Host Email</label>
              <input
                type="email"
                class="form-control"
                name="HostEmail"
                required
              />
            </div>
            <div class="mb-3">
              <label>Host Phone</label>
              <input
                type="number"
                class="form-control"
                name="HostPhone"
                required
              />
            </div>
            <div class="mb-3">
              <label>Address</label>
              <input type="text" class="form-control" name="Address" required />
            </div>
            <div class="mb-3">
              <label>Purpose of Visit</label>
              <input type="text" class="form-control" name="PurposeOfVisit" required />
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-outline-light">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Exit Modal -->
    <div
      class="modal fade"
      id="exitModal"
      tabindex="-1"
      aria-labelledby="exitLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content p-4">
          <h5 class="modal-title text-center mb-4" id="exitLabel">Exit</h5>
          <form action="exit.php" method="POST">
            <div class="mb-3">
              <label>User ID</label>
              <input type="text" class="form-control" name="UserId" required />
            </div>
            <div class="mb-3">
              <label>Email</label>
              <input type="email" class="form-control" name="Email" required />
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-outline-light">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
