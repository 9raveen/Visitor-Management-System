<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visitor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              "fade-in": "fadeIn 1s ease-out",
              "slide-up": "slideUp 0.5s ease-out",
              "pulse-slow": "pulse 3s infinite",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: 0 },
                "100%": { opacity: 1 },
              },
              slideUp: {
                "0%": { transform: "translateY(20px)", opacity: 0 },
                "100%": { transform: "translateY(0)", opacity: 1 },
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
    <!-- Header -->
    <nav class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-4 shadow-lg">
      <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-3">
          <i class="fas fa-chart-line text-2xl"></i>
          <h1 class="text-2xl font-bold">Visitor Management</h1>
        </div>
        <div class="flex items-center space-x-4">
          <span class="flex items-center">
            <i class="fas fa-clock mr-2"></i>
            <span class="text-sm font-medium">Real-time Dashboard</span>
          </span>
          <a href="login.html" class="hover:text-indigo-200 transition-colors">
            <i class="fas fa-sign-out-alt"></i>
          </a>
        </div>
      </div>
    </nav>

    <div class="container mx-auto px-4 py-6">
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 animate-fade-in">
        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition-all duration-300 border border-gray-100">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-gray-600 font-medium">Inside Now</h2>
            <i class="fas fa-users text-green-500"></i>
          </div>
          <p id="insideCount" class="text-3xl font-bold text-green-600">0</p>
          <p class="text-sm text-gray-500 mt-2">Currently in premises</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition-all duration-300 border border-gray-100">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-gray-600 font-medium">Checked Out</h2>
            <i class="fas fa-sign-out-alt text-red-500"></i>
          </div>
          <p id="outsideCount" class="text-3xl font-bold text-red-600">0</p>
          <p class="text-sm text-gray-500 mt-2">Left premises today</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition-all duration-300 border border-gray-100">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-gray-600 font-medium">Today's Total</h2>
            <i class="fas fa-calendar-check text-indigo-500"></i>
          </div>
          <p id="totalCount" class="text-3xl font-bold text-indigo-600">0</p>
          <p class="text-sm text-gray-500 mt-2">Total visitors today</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-lg transition-all duration-300 border border-gray-100">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-gray-600 font-medium">Alerts</h2>
            <i class="fas fa-bell text-yellow-500"></i>
          </div>
          <p id="alertCount" class="text-3xl font-bold text-yellow-500">0</p>
          <p class="text-sm text-gray-500 mt-2">Active notifications</p>
        </div>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-100">
          <div class="flex items-center justify-between">
            <h2 class="text-xl font-semibold text-gray-800">Recent Check-ins</h2>
            <span class="text-sm text-gray-500">
              <i class="fas fa-sync-alt animate-spin-slow mr-1"></i>
              Auto-updates every 10s
            </span>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                  <div class="flex items-center space-x-2">
                    <i class="fas fa-user text-gray-400"></i>
                    <span>Name</span>
                  </div>
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                  <div class="flex items-center space-x-2">
                    <i class="fas fa-sign-in-alt text-gray-400"></i>
                    <span>Check-In</span>
                  </div>
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                  <div class="flex items-center space-x-2">
                    <i class="fas fa-sign-out-alt text-gray-400"></i>
                    <span>Check-Out</span>
                  </div>
                </th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                  <div class="flex items-center space-x-2">
                    <i class="fas fa-info-circle text-gray-400"></i>
                    <span>Status</span>
                  </div>
                </th>
              </tr>
            </thead>
            <tbody id="recentCheckins" class="divide-y divide-gray-100 bg-white">
              <!-- Dynamic rows will go here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
        </table>
      </div>
    </div>

    <script>
      function formatTime(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          hour12: true
        });
      }

      function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          hour12: true
        });
      }

      function getStatusBadge(status) {
        if (status === 'Inside') {
          return `
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
              <i class="fas fa-circle text-green-400 mr-1 text-xs"></i>
              Inside
            </span>
          `;
        } else {
          return `
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
              <i class="fas fa-circle text-red-400 mr-1 text-xs"></i>
              Checked Out
            </span>
          `;
        }
      }

      function updateStats(data) {
        const stats = [
          { id: 'insideCount', value: data.inside },
          { id: 'outsideCount', value: data.outside },
          { id: 'totalCount', value: data.total },
          { id: 'alertCount', value: data.alerts }
        ];

        stats.forEach(({ id, value }) => {
          const element = document.getElementById(id);
          const currentValue = parseInt(element.textContent);
          if (currentValue !== value) {
            element.classList.add('animate-pulse');
            element.textContent = value;
            setTimeout(() => element.classList.remove('animate-pulse'), 1000);
          }
        });
      }

      function fetchDashboardData() {
        fetch("get_dashboard_data.php")
          .then((res) => res.json())
          .then((data) => {
            if (data.error) {
              console.error(data.error);
              return;
            }

            // Update stats with animation
            updateStats(data);

            // Update recent check-ins table
            const recentCheckinsContainer = document.getElementById("recentCheckins");
            recentCheckinsContainer.innerHTML = ""; // Clear existing rows

            data.recentCheckins.forEach((checkin, index) => {
              const row = document.createElement("tr");
              row.classList.add(
                "hover:bg-gray-50",
                "transition-all",
                "duration-150",
                "animate-slide-up"
              );
              row.style.animationDelay = `${index * 50}ms`;

              row.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap">
                  <div class="flex items-center">
                    <div class="flex-shrink-0 h-8 w-8 bg-gray-100 rounded-full flex items-center justify-center">
                      <i class="fas fa-user text-gray-500"></i>
                    </div>
                    <div class="ml-4">
                      <div class="font-medium text-gray-900">${checkin.name}</div>
                    </div>
                  </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                  <div class="text-sm text-gray-900">${formatDate(checkin.checkIn)}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                  <div class="text-sm text-gray-900">${checkin.checkOut ? formatDate(checkin.checkOut) : '---'}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                  ${getStatusBadge(checkin.status)}
                </td>
              `;

              recentCheckinsContainer.appendChild(row);
            });
          })
          .catch((err) => {
            console.error("Error fetching data:", err);
          });
      }

      // Initial fetch and setup interval
      fetchDashboardData();
      setInterval(fetchDashboardData, 10000);

      // Add a visual indicator when data refreshes
      setInterval(() => {
        const refreshIcon = document.querySelector('.fa-sync-alt');
        refreshIcon.classList.add('animate-spin');
        setTimeout(() => refreshIcon.classList.remove('animate-spin'), 1000);
      }, 10000);
    </script>
  </body>
</html>
